name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9.15.9
  NODE_VERSION: 20

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (needed for typecheck)
        run: pnpm --filter @cms-be-all/api prisma:generate

      - run: pnpm lint
      - run: pnpm typecheck

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: cms_test_password
          POSTGRES_DB: cms_be_all_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cms:cms_test_password@localhost:5432/cms_be_all_test?schema=public
      JWT_ACCESS_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @cms-be-all/api prisma:deploy

      - name: Unit tests
        run: pnpm --filter @cms-be-all/api test

      - name: E2E tests
        run: pnpm --filter @cms-be-all/api test:e2e

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cms-be-all/web test
      - run: pnpm --filter @cms-be-all/web build

  docker-build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
